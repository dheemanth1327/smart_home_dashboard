<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Guardian</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🏠 Smart Sustainable Home Guardian</h1>

<div class="container">

  <div class="card">
    <h2>🌡 Temperature</h2>
    <p id="temp">-- °C</p>
  </div>

  <div class="card">
    <h2>🌫 Air Quality</h2>
    <p id="air">--</p>
  </div>

  <div class="card alert" id="gasCard">
    <h2>🔥 Gas Status</h2>
    <p id="gas">Safe</p>
  </div>

  <div class="card">
    <h2>💧 Water Level</h2>
    <p id="water">--</p>
  </div>

  <div class="card">
    <h2>🌱 Soil Moisture</h2>
    <p id="soil">--</p>
  </div>

  <div class="card">
    <h2>💡 Light</h2>
    <p id="light">--</p>
  </div>

</div>

<canvas id="chart"></canvas>

<script src="script.js"></script>

</body>
</html>
