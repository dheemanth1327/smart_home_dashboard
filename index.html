<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase (COMPAT VERSION - IMPORTANT) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🏠 Smart Home Guardian</h1>

<div class="dashboard">

  <div class="card" onclick="selectSensor('temp')">
    <h3>🌡 Temperature</h3>
    <p id="temp">--</p>
  </div>

  <div class="card" onclick="selectSensor('air')">
    <h3>🌫 Air Quality</h3>
    <p id="air">--</p>
  </div>

  <div class="card" onclick="selectSensor('gas')">
    <h3>🔥 Gas</h3>
    <p id="gas">--</p>
  </div>

  <div class="card" onclick="selectSensor('soil')">
    <h3>🌱 Soil</h3>
    <p id="soil">--</p>
  </div>

  <div class="card" onclick="selectSensor('water')">
    <h3>💧 Water</h3>
    <p id="water">--</p>
  </div>

</div>

<!-- GRAPH -->
<div id="graphContainer" style="display:none;">
  <h2 id="graphTitle">Graph</h2>
  <canvas id="chart"></canvas>
</div>

<canvas id="chart"></canvas>

<script src="script.js"></script>

</body>
</html>
